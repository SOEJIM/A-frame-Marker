<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Raycaster Tuned</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      cursor="rayOrigin: mouse;" 
      raycaster="objects: .letter-hitbox; far: 10;" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="model-i" src="I2.glb"></a-asset-item>
        <a-asset-item id="model-m" src="M2.glb"></a-asset-item>
        <a-asset-item id="model-d" src="D2.glb"></a-asset-item>
      </a-assets>

      <a-entity camera></a-entity>

      <a-marker type="pattern" url="pattern_QR.patt">
        
        <a-text value="Welcome!!" position="0 0 -1.2" rotation="-90 0 0" align="center" color="#FFD700" width="5" scale="2 2 2"></a-text>

        <a-entity id="anim-i" position="-1 0 0" animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 800; startEvents: spin">
          <a-entity
            class="clickable letter-hitbox"
            data-target="#anim-i"
            position="-0.6 0.5 0.3"
            geometry="primitive: box; width: 2.0; height: 1.3; depth: 3.0"
            material="color: Yellow; opacity: 0.0; transparent: true">
          </a-entity>
          <a-entity gltf-model="#model-i" rotation="0 90 -90" scale="0.1 0.1 0.1"></a-entity>
        </a-entity>

        <a-entity id="anim-m" position="0 0 0" animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 800; startEvents: spin">
          <a-entity
            class="clickable letter-hitbox"
            data-target="#anim-m"
            position="0 0.5 0.3"
            geometry="primitive: box; width: 0.9; height: 1.3; depth: 3.0"
            material="color: Green; opacity: 0.0; transparent: true">
          </a-entity>
          <a-entity gltf-model="#model-m" rotation="0 90 -90" scale="0.1 0.1 0.1"></a-entity>
        </a-entity>

        <a-entity id="anim-d" position="1 0 0" animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 800; startEvents: spin">
          <a-entity
            class="clickable letter-hitbox"
            data-target="#anim-d"
            position="0.6 0.5 0.3"
            geometry="primitive: box; width: 2.0; height: 1.3; depth: 3.0"
            material="color: Blue; opacity: 0.0; transparent: true">
          </a-entity>  
          <a-entity gltf-model="#model-d" rotation="180 90 -90" scale="0.1 0.1 0.1"></a-entity>
        </a-entity>

      </a-marker>
    </a-scene>

    <script>
      // 当たり判定の箱をすべて取得
const hitboxes = document.querySelectorAll('.letter-hitbox');

hitboxes.forEach((hitbox) => {
  // 'click'（Android用）と 'touchstart'（iPhone用）の両方に対応させる
  ['click', 'touchstart'].forEach((eventType) => {
    hitbox.addEventListener(eventType, function(event) {
      // iPhoneなどで、タッチとクリックが2重に反応するのを防ぐ
      event.preventDefault(); 
      
      // 自分が持っている data-target を取得して回す
      const targetId = this.getAttribute('data-target');
      document.querySelector(targetId).emit('spin');
    });
  });
});
    </script>
  </body>
</html>
