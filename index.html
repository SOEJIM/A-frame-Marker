<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Custom 3D Model</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="mouseCursor: true; raycaster: objects: .clickable" vr-mode-ui="enabled: false">
      
      <!-- 3Dモデルなどの素材（アセット）を事前に読み込んでおく（推奨） -->
      <a-assets>
        <a-asset-item id="model-i" src="I.glb"></a-asset-item>
        <a-asset-item id="model-m" src="M.glb"></a-asset-item>
        <a-asset-item id="model-d" src="D.glb"></a-asset-item>
      </a-assets>

      <a-entity camera></a-entity>

      <a-marker type="pattern" url="pattern_QR.patt">
        
        <!-- Welcomeテキスト（固定表示のまま） -->
        <a-text value="Welcome..." position="0 0 -1.2" rotation="-90 0 0" align="center" color="#FFD700" width="5" scale="2 2 2"></a-text>

        <!-- 3Dモデル「I」 -->
        <!-- gltf-model="#ID名" で事前に読み込んだモデルを指定します -->
        <!-- 当たり判定用の透明な板(geometry/material)はそのまま残しています -->
        <a-entity
          class="clickable letter"
          position="-1 0 0"
          geometry="primitive: plane; width: 0.7; height: 1.0"
          material="opacity: 0.0; transparent: true"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 800; startEvents: spin">

          <a-entity gltf-model="#model-i" rotation="0 90 90" scale="0.1 0.1 0.1"></a-entity>
        </a-entity>

        <!-- 3Dモデル「M」 -->
        <a-entity
          class="clickable letter"
          position="0 0 0"
          geometry="primitive: plane; width: 0.7; height: 1.0"
          material="opacity: 0.0; transparent: true"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 800; startEvents: spin">

          <a-entity gltf-model="#model-m" rotation="0 90 90" scale="0.1 0.1 0.1"></a-entity>
        </a-entity>

        <!-- 3Dモデル「D」 -->
        <a-entity
          class="clickable letter"
          position="1 0 0"
          geometry="primitive: plane; width: 0.7; height: 1.0"
          material="opacity: 0.0; transparent: true"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 800; startEvents: spin">

          <a-entity gltf-model="#model-d" rotation="0 90 90" scale="0.1 0.1 0.1"></a-entity>
        </a-entity>

      </a-marker>
      
    </a-scene>

    <script>
      const letters = document.querySelectorAll('.letter');
      letters.forEach((letter) => {
        letter.addEventListener('click', function() {
          this.emit('spin');
        });
      });
    </script>
  </body>
</html>
