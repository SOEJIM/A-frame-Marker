<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- スマホ画面での拡大縮小を防ぎ、全画面にフィットさせる -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Smartphone App</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <!-- スマホでのタップ対応 ＆ VRゴーグルボタン非表示(vr-mode-ui) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="mouseCursor: true; raycaster: objects: .clickable" vr-mode-ui="enabled: false">
      
      <a-entity camera></a-entity>

      <!-- カスタムマーカー（作成した.pattファイル）の読み込み -->
      <!-- ※マーカーのファイル名が異なる場合は「pattern_QR.patt」を書き換えてください -->
      <!-- ※マーカーの黒枠を細く設定して作成した場合は patternRatio="0.xx" を追加してください -->
      <a-marker type="pattern" url="pattern_QR.patt">
        
        <!-- Welcomeテキスト（固定） -->
        <a-text
          value="Welcome..."
          position="0 0 -1.2" 
          rotation="-90 0 0"
          align="center"
          color="#FFD700" 
          width="5"
          scale="2 2 2">
        </a-text>

        <!-- 文字「I」 (当たり判定の白板を opacity: 0.0 で透明にしています) -->
        <a-text class="clickable letter" value="I" position="-1 0 0" rotation="-90 0 0" align="center" color="#4CC3D9" width="5" scale="3 3 3"
          geometry="primitive: plane; width: 0.7; height: 1.0"
          material="color: white; opacity: 0.0; transparent: true"
          animation="property: rotation; from: -90 0 0; to: -90 0 360; dur: 800; startEvents: spin">
        </a-text>

        <!-- 文字「M」 -->
        <a-text class="clickable letter" value="M" position="0 0 0" rotation="-90 0 0" align="center" color="#FF4136" width="5" scale="3 3 3"
          geometry="primitive: plane; width: 0.7; height: 1.0"
          material="color: white; opacity: 0.0; transparent: true"
          animation="property: rotation; from: -90 0 0; to: -90 0 360; dur: 800; startEvents: spin">
        </a-text>

        <!-- 文字「D」 -->
        <a-text class="clickable letter" value="D" position="1 0 0" rotation="-90 0 0" align="center" color="#2ECC40" width="5" scale="3 3 3"
          geometry="primitive: plane; width: 0.7; height: 1.0"
          material="color: white; opacity: 0.0; transparent: true"
          animation="property: rotation; from: -90 0 0; to: -90 0 360; dur: 800; startEvents: spin">
        </a-text>

      </a-marker>
      
    </a-scene>

    <script>
      const letters = document.querySelectorAll('.letter');
      letters.forEach((letter) => {
        letter.addEventListener('click', function() {
          this.emit('spin');
        });
      });
    </script>
  </body>
</html>
