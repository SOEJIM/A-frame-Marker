<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- スマホでの表示倍率を固定する -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    <!-- 
      embedded: A-Frameをページに埋め込む
      arjs: トラッキングの設定（sourceType: webcam でカメラを使用）
      vr-mode-ui: スマホでVRゴーグルボタンを表示させない
    -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-marker preset="hiro">
        <a-marker type="pattern" url="img/pattern_QR.patt" patternRatio="0.5">
        <a-box id="box" position="0 0.5 0" material="color: yellow; opacity: 0.8;"></a-box>
      </a-marker>

      <!-- スマホの画面をタップした位置にレイを飛ばす設定 -->
      <a-entity camera>
        <a-cursor fuse="false" raycaster="objects: #box"></a-cursor>
      </a-entity>
      
    </a-scene>

    <script>
      const box = document.querySelector('#box');
      // PCのクリックとスマホのタップ両方に対応
      box.addEventListener('click', function () {
        this.setAttribute('material', 'color', 'orange');
        console.log("Tapped!");
      });
    </script>
  </body>
</html>
