<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Interaction</title>
  
  <!-- ライブラリのバージョンを少し新しく安定したものにアップデート -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
  <!-- スマホでの全画面表示設定などを最適化 -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    
    <!-- 視線（タップ）判定用のカーソルをカメラに追加 -->
    <a-entity camera>
      <!-- fuse="false" で視線ではなくタップで反応するように設定 -->
      <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
    </a-entity>

    <!-- Qiita記事で作成したカスタムマーカーを読み込む -->
    <!-- ※もしマーカー作成時にPattern Ratio（黒枠の太さ）を0.5から変更している場合は、 patternRatio="0.x" を追記してください -->
    <a-marker type="pattern" url="img/pattern_QR.patt">
      
      <!-- 記事では画像でしたが、3Dオブジェクト(箱)に置き換えています -->
      <!-- class="clickable" をつけることで、このオブジェクトだけタップ判定を受け付けるようにします -->
      <a-box id="target-obj" class="clickable" position="0 0.5 0" material="color: #4CC3D9;"></a-box>
      
      <!-- ※画像を使いたい場合は、上記のa-boxを消して以下を使います -->
      <!-- <a-image id="target-obj" class="clickable" width="5" height="5" position="0.2 0.4 0.4" rotation="-90 0 0" src="img/icon.png"></a-image> -->
      
    </a-marker>
  </a-scene>

  <!-- インタラクション（タップ時の動作）のスクリプト -->
  <script>
    // id="target-obj" が付いた要素を取得
    const target = document.querySelector('#target-obj');

    // オブジェクトがクリック（タップ）されたときの処理
    target.addEventListener('click', () => {
      // 例：色が赤に変わり、アラートが出る
      target.setAttribute('material', 'color', 'red');
      alert('オブジェクトが操作されました！');
      
      // もし画像(<a-image>)を使っている場合は、画像を切り替える処理などに変更できます
      // target.setAttribute('src', 'img/another_icon.png');
    });
  </script>
</body>
</html>
